name: KnittingApp
options:
  bundleIdPrefix: com.yourname
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""  # Udfyld med dit Apple Team ID

targets:
  KnittingApp:
    type: application
    platform: iOS
    sources:
      - path: KnittingApp
        excludes:
          - "**/*.md"
    resources:
      - path: KnittingApp/Resources
    info:
      path: KnittingApp/App/Info.plist
      properties:
        CFBundleName: $(PRODUCT_NAME)
        CFBundleDisplayName: StrikkeApp
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSPhotoLibraryUsageDescription: "Bruges til at tilføje fotos til dine projekter"
        NSPhotoLibraryAddUsageDescription: "Bruges til at gemme billeder"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.knittingapp
        INFOPLIST_FILE: KnittingApp/App/Info.plist
